services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TailorProTrackContext: Server=mysql;Port=3306;Database=${MYSQL_DATABASE:-TESTING_GARCIA};User=${MYSQL_USER:-tailor};Password=${MYSQL_PASSWORD:-Your_strong_password123};
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:9.7.1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Your_strong_password123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-TESTING_GARCIA}
      MYSQL_USER: ${MYSQL_USER:-tailor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Your_strong_password123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
